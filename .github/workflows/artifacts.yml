name: Build with Artifacts
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generar build
        run: |
          mkdir -p dist
          echo "<h1>Build ${{ github.sha }}</h1>" > dist/index.html
          echo "version: 1.0" > dist/version.txt
      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 5
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./downloaded
      - name: Verificar
        run: |
          ls -la downloaded/
          cat downloaded/version.txt
